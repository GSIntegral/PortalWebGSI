<header class="site-header" [class.is-scrolled]="scrolled()" [class.is-open]="menuOpen()">
  <div class="container site-header__inner">
    <app-logo variant="dark" />

    <nav class="nav" [class.is-open]="menuOpen()" aria-label="Navegación principal">
      <ul class="nav__list">
        @for (item of navItems; track item.path) {
          <li>
            <a
              class="nav__link"
              [routerLink]="item.path"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: item.path === '/' }"
              (click)="closeMenu()"
              >{{ item.label }}</a
            >
          </li>
        }
      </ul>
      <div class="nav__actions">
        @if (currentUser(); as user) {
          <a
            routerLink="/sst-dashboard"
            class="nav__link"
            routerLinkActive="is-active"
            (click)="closeMenu()"
            >Tablero SST</a
          >
          <button type="button" class="nav__login" (click)="logout()">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Cerrar sesión
          </button>
        } @else {
          <a routerLink="/login" class="nav__login" (click)="closeMenu()">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Iniciar sesión
          </a>
        }
        <a routerLink="/contactanos" class="btn btn--accent nav__cta" (click)="closeMenu()">
          Solicitar asesoría
        </a>
      </div>
    </nav>

    <button
      class="nav-toggle"
      [class.is-open]="menuOpen()"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Abrir menú"
    >
      <span></span><span></span><span></span>
    </button>
  </div>

  @if (menuOpen()) {
    <div class="nav-backdrop" (click)="closeMenu()"></div>
  }
</header>
