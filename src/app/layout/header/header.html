<header class="site-header" [class.is-scrolled]="scrolled()" [class.is-open]="menuOpen()">
  <div class="container site-header__inner">
    <app-logo variant="dark" />

    <nav class="nav" [class.is-open]="menuOpen()" aria-label="Navegación principal">
      <ul class="nav__list">
        @for (item of navItems; track item.path) {
          <li>
            <a
              class="nav__link"
              [routerLink]="item.path"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: item.path === '/' }"
              (click)="closeMenu()"
              >{{ item.label }}</a
            >
          </li>
        }
      </ul>
      <a routerLink="/contactanos" class="btn btn--accent nav__cta" (click)="closeMenu()">
        Solicitar asesoría
      </a>
    </nav>

    <button
      class="nav-toggle"
      [class.is-open]="menuOpen()"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Abrir menú"
    >
      <span></span><span></span><span></span>
    </button>
  </div>

  @if (menuOpen()) {
    <div class="nav-backdrop" (click)="closeMenu()"></div>
  }
</header>
